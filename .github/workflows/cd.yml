name: CD Metradingplat Auth Service

on:
  workflow_run:
    workflows: ["CI Metradingplat Auth Service"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Create Docker Network
        run: |
          docker network create metradingplat-network || echo "Network already exists"

      - name: Run Postgres Container
        run: |
          echo "Recreating postgres-auth container to ensure latest configuration..."
          docker rm -f postgres-auth || true
          docker run -d \
            --name "postgres-auth" \
            --network "metradingplat-network" \
            --restart "always" \
            --memory "256m" \
            --memory-swap "256m" \
            -e POSTGRES_DB="bd_auth" \
            -e POSTGRES_USER="user_auth" \
            -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            -v postgres_auth_data:/var/lib/postgresql/data \
            postgres:15-alpine

      - name: Infrastructure Diagnosis & Cleanup
        run: |
          echo "--- DISK SPACE CHECK ---"
          df -h
          echo "--- CLEANING SHARED BASE IMAGES ---"
          docker image rm -f eclipse-temurin:21-jdk eclipse-temurin:21-jre-alpine || true
          echo "--- CLEANING SERVICE METADATA ---"
          docker rm -f auth-service || true
          docker image rm -f virtud142/metradingplat_auth_service:latest || true

      - name: Pull Application Image (with Retry Logic)
        run: |
          echo "Attempting to pull image with auto-retry for stability..."
          for i in 1 2 3; do
            docker pull virtud142/metradingplat_auth_service:latest && exit 0 || \
            (echo "Attempt $i failed, waiting 10s..." && sleep 10)
          done
          echo "All pull attempts failed."
          exit 1

      - name: Delete Old Application Container
        run: docker rm -f auth-service || true

      - name: Run Application Container
        run: |
          docker run -d \
            --name "auth-service" \
            --network "metradingplat-network" \
            --restart "unless-stopped" \
            --memory "384m" \
            --memory-swap "384m" \
            --label project="metradingplat" \
            --label service="auth-service" \
            -e SPRING_PROFILES_ACTIVE="prod" \
            -e DB_HOST="postgres-auth" \
            -e DB_PORT="5432" \
            -e DB_NAME="bd_auth" \
            -e POSTGRES_USER="user_auth" \
            -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e EUREKA_HOST="directory" \
            virtud142/metradingplat_auth_service:latest

      - name: Upsert Fixed Users (admin, viewer)
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VIEWER_PASSWORD: ${{ secrets.VIEWER_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # No longer installing bcrypt via pip to avoid host dependency issues

          echo "Waiting for auth-service to initialize the database schema..."
          for i in $(seq 1 30); do
            ROLE_COUNT=$(docker exec -e PGPASSWORD="$POSTGRES_PASSWORD" postgres-auth \
              psql -U user_auth -d bd_auth -t -c "SELECT COUNT(*) FROM roles;" 2>/dev/null | tr -d ' ')
            if [ "${ROLE_COUNT:-0}" -ge "2" ] 2>/dev/null; then
              echo "Schema ready (roles: $ROLE_COUNT)"
              break
            fi
            echo "Attempt $i/30 - waiting 3s..."
            sleep 3
          done

          # Hashes are now generated directly in the database using pgcrypto

          docker exec -i -e PGPASSWORD="$POSTGRES_PASSWORD" postgres-auth \
            psql -U user_auth -d bd_auth << ENDSQL
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          
          -- 1. Clean up duplicated roles (keep only one per name)
          DELETE FROM user_roles WHERE role_id IN (SELECT id FROM roles a WHERE EXISTS (SELECT 1 FROM roles b WHERE b.name = a.name AND b.id < a.id));
          DELETE FROM roles a WHERE EXISTS (SELECT 1 FROM roles b WHERE b.name = a.name AND b.id < a.id);
          
          -- 2. Upsert admin user
          INSERT INTO users (username, password) 
          VALUES ('admin', crypt('${ADMIN_PASSWORD}', gen_salt('bf', 10)))
          ON CONFLICT (username) DO UPDATE SET password = EXCLUDED.password;
          
          -- 3. Upsert viewer user
          INSERT INTO users (username, password) 
          VALUES ('viewer', crypt('${VIEWER_PASSWORD}', gen_salt('bf', 10)))
          ON CONFLICT (username) DO UPDATE SET password = EXCLUDED.password;
          
          -- 4. Sync roles (ensure admin has ROLE_EDITOR and viewer has ROLE_VIEWER)
          -- Remove existing associations first to avoid duplicates
          DELETE FROM user_roles WHERE user_id IN (SELECT id FROM users WHERE username IN ('admin', 'viewer'));
          
          INSERT INTO user_roles (user_id, role_id) 
          SELECT u.id, r.id FROM users u, roles r 
          WHERE u.username = 'admin' AND r.name = 'ROLE_EDITOR';
          
          INSERT INTO user_roles (user_id, role_id) 
          SELECT u.id, r.id FROM users u, roles r 
          WHERE u.username = 'viewer' AND r.name = 'ROLE_VIEWER';
          ENDSQL
          echo "Users admin and viewer upserted successfully without duplication."

      - name: Clean Old Images of This Service
        run: |
          echo "Cleaning old images for auth-service service..."
          CURRENT_IMAGE=$(docker inspect auth-service --format='{{.Image}}' 2>/dev/null || echo "")
          if [ -n "$CURRENT_IMAGE" ]; then
            docker images --filter "label=service=auth-service" --format "{{.ID}}" | while read img; do
              if [ "$img" != "${CURRENT_IMAGE:7:12}" ]; then
                echo "Removing old image: $img"
                docker rmi -f $img 2>/dev/null || true
              fi
            done
          fi
          docker images virtud142/metradingplat_auth_service --format "{{.ID}} {{.Tag}}" | grep -v "latest" | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

      - name: Clean Stopped Containers of This Service
        run: |
          echo "Cleaning stopped containers for auth-service service..."
          docker ps -a --filter "label=service=auth-service" --filter "status=exited" -q | xargs -r docker rm 2>/dev/null || true

      - name: Final Status Check
        run: |
          sleep 5
          docker ps | grep auth-service
